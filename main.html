<script src="https://unpkg.com/html5-qrcode"></script>

<div id="reader"></div>

<script>
function onScanSuccess(decodedText) {
  fetch("https://script.google.com/a/macros/portledge.org/s/AKfycbxFNlLDoUKBJmaojuW5u6eL3AQBd2Ke6_QPk7evp34nV4d0ayjQKGbuVKVGDTs1538s/exec", {
    method: "POST",
    body: JSON.stringify({
      partId: decodedText,
      action: "remove" // or "add"
    })
  });
}

new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 })
  .render(onScanSuccess);
</script>
