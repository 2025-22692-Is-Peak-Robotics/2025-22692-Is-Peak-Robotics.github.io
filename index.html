<!DOCTYPE html>
<html>
<head>
  <title>Inventory Scanner</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 20px;
    }

    button {
      padding: 10px 20px;
      margin: 5px;
      font-size: 16px;
      cursor: pointer;
    }

    #reader {
      width: 300px;
      margin: auto;
    }

    #status {
      margin-top: 15px;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <h2>Inventory Scanner</h2>

  <button onclick="setMode('In Stock')">Mark In Stock</button>
  <button onclick="setMode('Out of Stock')">Mark Out of Stock</button>

  <p id="modeDisplay">Mode: Out of Stock</p>

  <div id="reader"></div>

  <p id="status">Waiting to scan...</p>

  <script>
    let mode = "Out of Stock";
    let lastScan = "";
    let lastScanTime = 0;

    function setMode(newMode) {
      mode = newMode;
      document.getElementById("modeDisplay").innerText = "Mode: " + mode;
    }

    function onScanSuccess(decodedText) {
      const now = Date.now();

      // 🚫 Prevent duplicate scans within 2 seconds
      if (decodedText === lastScan && (now - lastScanTime) < 2000) {
        return;
      }

      lastScan = decodedText;
      lastScanTime = now;

      document.getElementById("status").innerText =
        "Scanned: " + decodedText + " → " + mode;

      fetch("https://script.google.com/a/macros/portledge.org/s/AKfycbzLzufwYbqQdh7S3gjv7WGqcStxagrHefd3uPXBAfOwNkQeUozcv5b838iTQFBOfGQr/exec", {
        method: "POST",
        body: JSON.stringify({
          partId: decodedText,
          status: mode
        })
      })
      .then(res => res.text())
      .then(data => {
        document.getElementById("status").innerText =
          "✅ " + data;
      })
      .catch(err => {
        document.getElementById("status").innerText =
          "❌ Error sending data";
        console.error(err);
      });
    }

    function onScanFailure(error) {
      // ignore scan errors
    }

    const scanner = new Html5QrcodeScanner("reader", {
      fps: 10,
      qrbox: 250
    });

    scanner.render(onScanSuccess, onScanFailure);
  </script>

</body>
</html>
